name: Database Migration Check

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/api/prisma/**"

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: marketplace_migration_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketplace_migration_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @marketplace/api exec prisma generate

      - name: Apply migrations
        run: pnpm --filter @marketplace/api exec prisma migrate deploy

      - name: Check for schema drift
        run: |
          # Verify that the schema is in sync with migrations
          # This will exit with non-zero if the database schema does not
          # match what the migrations produce
          pnpm --filter @marketplace/api exec prisma migrate diff \
            --from-migrations ./apps/api/prisma/migrations \
            --to-schema-datamodel ./apps/api/prisma/schema.prisma \
            --shadow-database-url "postgresql://postgres:postgres@localhost:5432/marketplace_shadow_test?schema=public" \
            --exit-code
